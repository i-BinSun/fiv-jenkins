services:
  jenkins:
    build: .
    container_name: fiv-jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"    # Jenkins Web UI
      - "50000:50000"  # Jenkins agent communication
    volumes:
      - jenkins_data:/var/jenkins_home
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai

volumes:
  jenkins_data:
